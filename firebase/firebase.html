<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .texto{

        }
        .campo{
            border: 1px solid blue; 

        }
        .botão{
            background-color: yellow;
            color: black;

        }
        .fieldset{
            border: 1px solid gray
        }
    </style>
</head>

<body>
  
  <form>
    <fieldset>
        <legend>Cadastro do firebase</legend>
    <p class="texto">CPF:</p> <input type="text" class="campo" placeholder="Digite seu cpf" maxlength="11" minlength="11" required><br><br>
    <p class="texto">EMAIL:</p> <input type="text" class="campo" placeholder="Digite seu email" maxlength="50" minlength="10" required><br><br>
    <p class="texto">NOME:</p> <input type="text" class="campo" placeholder="Digite seu nome" maxlength="35" minlength="5" required><br><br>
    <p class="texto">SENHA:</p> <input type="text" class="campo" placeholder="Digite sua senha" maxlength="25" minlength="8" required><br><br>
    <p class="texto">TELEFONE:</p> <input type="text" class="campo" placeholder="Digite seu telefone" maxlength="11" minlength="11" required><br><br>
    <input type="submit" value="Cadastrar" class="botão">
    </fieldset>
  </form>
  
</body>
</html>
